name: RuoYi API Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check --ignore E501,F821 .

      - name: Validate framework structure
        run: |
          echo "=== 检查项目结构 ==="
          test -f api/base_api.py && echo "✅ api/base_api.py"
          test -f api/login_api.py && echo "✅ api/login_api.py"
          test -f api/role_api.py && echo "✅ api/role_api.py"
          test -f api/system_user_api.py && echo "✅ api/system_user_api.py"
          test -f tests/test_login.py && echo "✅ tests/test_login.py"
          test -f tests/test_business_flow.py && echo "✅ tests/test_business_flow.py"
          test -f README.md && echo "✅ README.md"
          echo ""

      - name: Verify Python imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          print('=== 验证模块导入 ===')
          from api.base_api import BaseApi; print('✅ base_api')
          from api.login_api import LoginApi; print('✅ login_api')
          from api.role_api import RoleApi; print('✅ role_api')
          from utils.logger import logger; print('✅ logger')
          from utils.db_utils import DbClient; print('✅ db_utils')
          from utils.excel_utils import read_excel; print('✅ excel_utils')
          from utils.assertions import HttpAssert; print('✅ assertions')
          from utils.data_driver import render_case, send_request; print('✅ data_driver')
          print()
          print('所有模块导入成功！框架结构验证通过 ✅')
          "

      - name: Collect test count (skip if no backend)
        run: |
          python -m pytest tests/ testcases/ --collect-only -q
        continue-on-error: true
