name: RuoYi API Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check project structure
        run: |
          echo "=== 检查必要文件 ==="
          for f in api/base_api.py api/login_api.py api/role_api.py api/system_user_api.py tests/test_login.py tests/test_business_flow.py tests/test_system_user.py tests/test_role.py utils/db_utils.py README.md requirements.txt; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ $f 缺失！"
              exit 1
            fi
          done
          echo ""
          echo "项目结构完整 ✅"

      - name: Test Python import
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          print('=== 验证模块导入 ===')
          from api.base_api import BaseApi
          from api.login_api import LoginApi
          from api.role_api import RoleApi
          from api.system_user_api import SystemUserApi
          from utils.logger import logger
          from utils.db_utils import DbClient
          from utils.excel_utils import read_excel
          from utils.data_driver import render_case, send_request, do_assert
          print('全部模块导入成功 ✅')
          "
