# =============================================
# RuoYi API Test Framework — Docker 部署
# 一条命令启动完整测试环境
# =============================================

services:

  mysql:
    image: mysql:8.0
    container_name: ry-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ry-vue
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ry-network

  redis:
    image: redis:7-alpine
    container_name: ry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ry-network

  ruoyi-api:
    build:
      context: ./docker/ruoyi
      dockerfile: Dockerfile
      args:
        - RUOYI_VERSION=v3.9.2
    container_name: ry-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_JSON: '{"spring":{"data":{"redis":{"host":"redis","port":6379}},"datasource":{"druid":{"master":{"url":"jdbc:mysql://mysql:3306/ry-vue?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true","username":"root","password":"root"}}},"server":{"port":8080}}}'
      RUOYI_NAME: RuoYi
      RUOYI_VERSION: 3.9.2
      RUOYI_PROFILE: /home/ruoyi/uploadPath
    # 不对外暴露 8080，仅 Docker 内部网络访问（ruoyi-api:8080）
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ >/dev/null 2>&1 || curl -sf http://localhost:8080/login >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - ry-network

  # ruoyi-web commented out

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: ry-test-runner
    profiles:
      - test
    depends_on:
      - ruoyi-api
    environment:
      BASE_URL: http://ruoyi-api:8080
      ENV: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ry-vue
      DB_USER: root
      DB_PASSWORD: root
    volumes:
      - ./tests:/app/tests
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data:/app/data
      # testcases/ 不挂载 volume —— 直接从镜像内 COPY . . 提供
    networks:
      - ry-network

  allure-reporter:
    build:
      context: ./docker/allure
      dockerfile: Dockerfile
    container_name: ry-allure-gen
    profiles:
      - report
    volumes:
      - ./reports:/app/reports
    working_dir: /app/reports
    command: generate allure-results -o allure-report --clean
    networks:
      - ry-network

  allure-report:
    image: nginx:alpine
    user: "0:0"
    container_name: ry-allure-report
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./reports/allure-report:/usr/share/nginx/html:ro
    networks:
      - ry-network

volumes:
  mysql_data:
  redis_data:

networks:
  ry-network:
    driver: bridge
