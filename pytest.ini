[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=./reports/allure-results
    --clean-alluredir
    --maxfail=10
    -p no:cacheprovider
markers =
    smoke: 冒烟测试（核心功能验证）
    critical: 关键路径测试
    regression: 回归测试
    slow: 慢速测试
    p0: P0 级别（阻塞性，必须通过）
    p1: P1 级别（核心功能）
    p2: P2 级别（次要功能）
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
